AWSTemplateFormatVersion: '2010-09-09'
Description: Tilawa Backend — API Gateway + Lambda + DynamoDB + Bedrock

Parameters:
  StageName:
    Type: String
    Default: dev
    Description: Deployment stage name
  ProjectName:
    Type: String
    Default: tilawa
    Description: Project name used for resource naming
  BedrockRoleArn:
    Type: String
    NoEcho: true
    # Cross-account role assumption used to access Bedrock Nova Lite quota
    # on the root account while keeping all other infrastructure isolated
    # in the member account. Temporary measure pending quota increase approval.
    Description: ARN of the cross-account Bedrock access role (entered at deploy time)
  QuranClientId:
    Type: String
    NoEcho: true
    Description: Quran Foundation OAuth2 client ID
  QuranClientSecret:
    Type: String
    NoEcho: true
    Description: Quran Foundation OAuth2 client secret
  QuranPreliveClientId:
    Type: String
    NoEcho: true
    Description: Quran Foundation prelive OAuth2 client ID
  QuranPreliveClientSecret:
    Type: String
    NoEcho: true
    Description: Quran Foundation prelive OAuth2 client secret

Resources:

  # ---- DynamoDB Table ----
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-table-${StageName}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  # ---- IAM Execution Role ----
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-lambda-role-${StageName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                Resource: !GetAtt DynamoDBTable.Arn
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: '*'
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
        - PolicyName: AssumeBedrockRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource: !Ref BedrockRoleArn

  # ---- Lambda Function ----
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-handler-${StageName}'
      Runtime: nodejs22.x
      Handler: src/index.handler
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          export async function handler() {
            return { statusCode: 200, body: JSON.stringify({ message: "Placeholder - upload real code via Lambda console" }) };
          }
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          TABLE_NAME: !Ref DynamoDBTable
          QF_CLIENT_ID: !Ref QuranClientId
          QF_CLIENT_SECRET: !Ref QuranClientSecret
          QF_ENV: production
          QF_PRELIVE_CLIENT_ID: !Ref QuranPreliveClientId
          QF_PRELIVE_CLIENT_SECRET: !Ref QuranPreliveClientSecret
          BEDROCK_ROLE_ARN: !Ref BedrockRoleArn

  # ---- API Gateway REST API ----
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${ProjectName}-api-${StageName}'
      Description: Tilawa Backend REST API

  ProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: '{proxy+}'

  ProxyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ProxyResource
      HttpMethod: ANY
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunction.Arn}/invocations'

  OptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ProxyResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      ApiKeyRequired: false
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin: "'*'"
              method.response.header.Access-Control-Allow-Methods: "'GET, POST, PUT, PATCH, DELETE, OPTIONS'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type, Authorization, x-api-key'"
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Headers: true

  # ---- API Key, Usage Plan, Deployment, Stage ----
  Deployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ProxyMethod
      - OptionsMethod
    Properties:
      RestApiId: !Ref RestApi

  Stage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref Deployment
      StageName: !Ref StageName

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: Stage
    Properties:
      Name: !Sub '${ProjectName}-api-key-${StageName}'
      Enabled: true
      StageKeys:
        - RestApiId: !Ref RestApi
          StageName: !Ref StageName

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: Stage
    Properties:
      UsagePlanName: !Sub '${ProjectName}-usage-plan-${StageName}'
      ApiStages:
        - ApiId: !Ref RestApi
          Stage: !Ref StageName

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

  # ---- Gateway Responses (CORS on 4XX/5XX) ----
  GatewayResponseDefault4XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref RestApi
      ResponseType: DEFAULT_4XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type, Authorization, x-api-key'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET, POST, PUT, PATCH, DELETE, OPTIONS'"

  GatewayResponseDefault5XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref RestApi
      ResponseType: DEFAULT_5XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type, Authorization, x-api-key'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET, POST, PUT, PATCH, DELETE, OPTIONS'"

  # ---- Lambda Permission ----
  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*'

Outputs:
  ApiInvokeUrl:
    Description: API Gateway invoke URL
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}'
  ApiKeyValue:
    Description: API key value
    Value: !Ref ApiKey
